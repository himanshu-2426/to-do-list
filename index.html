<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo List Project</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <section class="card">
        <h1>Todo List</h1>
        <form id="todo-form">
          <input id="todo-input" type="text" placeholder="What needs to be done?" maxlength="80" required />
          <button type="submit">Add</button>
        </form>
        <ul id="todo-list"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
